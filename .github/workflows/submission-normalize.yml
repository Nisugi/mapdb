name: Submission Normalize

# Checks that submitted room files normalize cleanly into the git-canonical
# form. In-game submissions (`;cartographer --submit`) arrive raw: {room}
# with StringProcs inline as ";e" strings and no checksum. This workflow
# runs the cartographer `normalize` task over the changed files and fails
# the PR when a submission is malformed (invalid room schema, dangling
# userland StringProc references, path/id mismatches).
#
# The canonical rewrite itself is NOT pushed to the PR branch - fork
# branches cannot be pushed to with the default token - it lands on main
# after merge via normalize-main.yml. This check guarantees that rewrite
# will succeed, and reports whether the submission introduces StringProc
# changes (which deserve human review; see .github/CODEOWNERS).
#
# SECURITY: this runs on pull_request_target with a write-capable token.
# The PR head checkout is treated strictly as DATA - nothing from it is
# executed. The cartographer CLI comes from the separate pinned checkout.

on:
  pull_request_target:
    branches:
      - main
    paths:
      - 'gs/rooms/**/room.json'
    types:
      - opened
      - synchronize
      - reopened

env:
  # Source of the cartographer CLI (must contain the `normalize` task).
  # Defaults to upstream; forks can point elsewhere via repository variables
  # for rehearsal. Can move to `bunx @elanthia/cartographer` once a release
  # containing the normalize task is published to npm.
  CARTOGRAPHER_REPO: ${{ vars.CARTOGRAPHER_REPO || 'elanthia-online/cartographer' }}
  CARTOGRAPHER_REF: ${{ vars.CARTOGRAPHER_REF || 'main' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  normalize-check:
    runs-on: ubuntu-latest
    outputs:
      proc_changes: ${{ steps.procs.outputs.proc_changes }}
      effective: ${{ steps.normalize.outputs.effective }}
      stale: ${{ steps.stale.outputs.stale }}
      deletions: ${{ steps.changed-files.outputs.deleted_count }}
    steps:
      - name: Checkout PR head (data only - never executed)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Checkout cartographer CLI (trusted)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.CARTOGRAPHER_REPO }}
          ref: ${{ env.CARTOGRAPHER_REF }}
          path: .cartographer

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: latest

      - name: Install cartographer dependencies
        working-directory: .cartographer
        run: bun install --frozen-lockfile

      - name: Install standardrb (StringProc formatter)
        run: gem install standard --no-document || echo "standardrb unavailable - formatting will be applied post-merge"

      - name: Get changed room files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only --diff-filter=AM origin/main...HEAD | grep 'gs/rooms/.*/room.json' | tr '\n' ' ' || true)
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "count=$(echo $CHANGED_FILES | wc -w)" >> $GITHUB_OUTPUT

          DELETED_FILES=$(git diff --name-only --diff-filter=D origin/main...HEAD | grep 'gs/rooms/.*/room.json' | tr '\n' ' ' || true)
          echo "deleted=$DELETED_FILES" >> $GITHUB_OUTPUT
          echo "deleted_count=$(echo $DELETED_FILES | wc -w)" >> $GITHUB_OUTPUT

          if [ -n "$CHANGED_FILES" ]; then
            echo "Changed room files:"
            echo "$CHANGED_FILES" | tr ' ' '\n'
          fi
          if [ -n "$DELETED_FILES" ]; then
            echo "Deleted room files:"
            echo "$DELETED_FILES" | tr ' ' '\n'
          fi
          if [ -z "$CHANGED_FILES$DELETED_FILES" ]; then
            echo "No room files changed"
          fi

      - name: Stale-baseline check
        id: stale
        if: steps.changed-files.outputs.count > 0 || steps.changed-files.outputs.deleted_count > 0
        env:
          # Attacker-controlled on pull_request_target - must come in via env,
          # never interpolated into the script.
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Submissions are whole-room replacements serialized from the
          # submitter's installed release. If a submitted room changed on
          # main AFTER that baseline (a concurrent edit by someone else),
          # merging as-is would silently revert the newer edit. Releases
          # correspond to git tags, so this is a per-room blob comparison:
          # room at the baseline tag vs room on main today.
          git fetch origin --tags --quiet || true

          BASELINE=$(printf '%s' "$PR_BODY" | grep -oE 'baseline v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/baseline //')
          if [ -z "$BASELINE" ]; then
            echo "No baseline version in the PR body - concurrent-edit safety cannot be verified."
            echo "stale=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi
          if ! git rev-parse -q --verify "refs/tags/$BASELINE" >/dev/null; then
            echo "Baseline tag $BASELINE not found in this repo."
            echo "stale=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT

          : > stale-rooms.txt
          # Deletions are checked too: deleting a room someone else edited
          # after this submission's baseline would revert their work.
          for f in ${{ steps.changed-files.outputs.files }} ${{ steps.changed-files.outputs.deleted }}; do
            AT_TAG=$(git rev-parse -q --verify "$BASELINE:$f" 2>/dev/null || echo missing)
            AT_MAIN=$(git rev-parse -q --verify "origin/main:$f" 2>/dev/null || echo missing)
            if [ "$AT_TAG" != "$AT_MAIN" ]; then
              echo "$f" >> stale-rooms.txt
            fi
          done

          if [ -s stale-rooms.txt ]; then
            echo "stale=true" >> $GITHUB_OUTPUT
            echo "Rooms changed on main since baseline $BASELINE:"
            cat stale-rooms.txt
          else
            echo "stale=false" >> $GITHUB_OUTPUT
            echo "All submitted rooms are unchanged on main since baseline $BASELINE."
          fi

      - name: Normalize changed room files
        id: normalize
        if: steps.changed-files.outputs.count > 0
        run: |
          bun .cartographer/src/cartographer.ts normalize -i ./gs ${{ steps.changed-files.outputs.files }}

          # Record what the post-merge canonicalization will change.
          git add -A gs

          # Re-submission detection: clients diff against their installed
          # RELEASE, so edits that already merged (but are not yet in a
          # release) keep being re-submitted. After canonicalization, such a
          # submission is byte-identical to main - flag it instead of
          # churning the history with net-zero merge + normalize commits.
          if git diff --quiet origin/main -- gs; then
            echo "effective=false" >> $GITHUB_OUTPUT
            echo "After canonicalization this submission is identical to main - nothing new to merge."
          else
            echo "effective=true" >> $GITHUB_OUTPUT
          fi

          if git diff --cached --quiet; then
            echo "Submission is already canonical."
          else
            git diff --cached --stat > normalize-preview.txt
            echo "Post-merge canonicalization preview:"
            cat normalize-preview.txt
          fi

      - name: Detect StringProc changes
        id: procs
        if: steps.changed-files.outputs.count > 0 || steps.changed-files.outputs.deleted_count > 0
        run: |
          # Proc code can change three ways: normalize externalizes new/edited
          # procs from submitted room.json (staged), a PR edits .rb files
          # directly, or a room deletion removes its proc files. All three
          # need StringProc-maintainer eyes.
          STAGED_RB=$(git diff --cached --name-only -- '*.rb' 2>/dev/null || true)
          PR_RB=$(git diff --name-only origin/main...HEAD -- '*.rb' || true)
          if [ -n "$STAGED_RB$PR_RB" ]; then
            echo "proc_changes=true" >> $GITHUB_OUTPUT
          else
            echo "proc_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Build StringProc review report
        if: steps.procs.outputs.proc_changes == 'true'
        run: |
          # Render each new/changed proc with room/edge context so the
          # StringProc reviewer reads code in the PR conversation instead of
          # excavating it from room.json diffs.
          edge_label() {
            echo "$1" | sed -E 's#^gs/rooms/([0-9]+)/(wayto|timeto)/stringproc-([0-9]+)\.rb$#room \1 \&rarr; \3 (\2)#'
          }

          # Advisory heuristic: proc code referencing constants outside the
          # common map-proc vocabulary often means script-local modules
          # (e.g. Teleport.*) that break for players without that script.
          # String/regex literals are stripped first to cut false positives.
          KNOWN='Cartographer|Spell|Spells|Stats|Skills|Society|Char|CharSettings|Settings|GameSettings|UserVars|Vars|Map|Room|GameObj|GameObjs|XMLData|Lich|Script|StringProc|Effects|Infomon|Feat|CMan|Armor|Shield|Weapon|Warcry|Ascension|Gift|Wounds|Scars|Time|Integer|Float|String|Array|Hash|Regexp|Math|Kernel|Comparable|Numeric|You|Your|He|His|She|Her|It|Its|They|Their'
          vocab_check() {
            # Strip string and regex literals first - game-text matchers are
            # full of capitalized English that isn't code.
            UNKNOWN=$(sed "s/'[^']*'//g; s/\"[^\"]*\"//g; s#/[^/]*/##g" "$1" | grep -oE '\b[A-Z][A-Za-z0-9_]*' | sort -u | grep -vE "^($KNOWN)$" | tr '\n' ' ' || true)
            if [ -n "$UNKNOWN" ]; then
              echo "> ⚠️ References outside the common map-proc vocabulary: \`$UNKNOWN\`— if these come from a custom script, this proc will break for players who don't run it." >> proc-report.md
              echo >> proc-report.md
            fi
          }

          : > proc-report.md
          for f in $(git diff --cached --name-only --diff-filter=A -- '*.rb'); do
            {
              echo "**New proc: $(edge_label "$f")** — \`$f\`"
              echo '```ruby'
              cat "$f"
              echo
              echo '```'
              echo
            } >> proc-report.md
            vocab_check "$f"
          done

          for f in $(git diff --cached --name-only --diff-filter=M -- '*.rb'); do
            {
              echo "**Modified proc: $(edge_label "$f")** — \`$f\`"
              echo '```diff'
              git diff --cached -- "$f" | tail -n +5
              echo
              echo '```'
              echo
            } >> proc-report.md
            vocab_check "$f"
          done

          # Procs removed by the PR itself (room deletions).
          for f in $(git diff --name-only --diff-filter=D origin/main...HEAD -- '*.rb'); do
            echo "**Deleted proc: $(edge_label "$f")** — \`$f\`" >> proc-report.md
            echo >> proc-report.md
          done

      - name: Label StringProc / stale-baseline changes
        if: steps.procs.outputs.proc_changes == 'true' || steps.stale.outputs.stale == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const labels = [];
            if ('${{ steps.procs.outputs.proc_changes }}' === 'true') labels.push('stringprocs');
            if ('${{ steps.stale.outputs.stale }}' === 'true') labels.push('stale-baseline');
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels
            }).catch(e => core.warning(`could not add labels: ${e.message}`));

      - name: Comment normalize results
        if: always() && (steps.changed-files.outputs.count > 0 || steps.changed-files.outputs.deleted_count > 0)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            // Sticky comment: one living report per PR, updated in place.
            const MARKER = '<!-- cartographer-submission-normalize -->';
            let comment = MARKER + '\n## Submission Normalize Check\n\n';

            // 'skipped' means a deletion-only PR: nothing to normalize is fine.
            const normalizeOk = ['success', 'skipped'].includes('${{ steps.normalize.outcome }}');

            if (normalizeOk && '${{ steps.normalize.outputs.effective }}' === 'false') {
              comment += 'ℹ️ **Nothing new to merge.** After canonicalization this submission is identical to what main already contains - these changes were merged previously. This usually means the submitting client\'s map baseline (its installed release) predates the earlier merge; the diff will clear up when the next mapdb release ships. This PR can be closed.\n\n';
            } else if (normalizeOk) {
              comment += '✅ Submission normalizes cleanly.\n\n';
              try {
                const preview = fs.readFileSync('normalize-preview.txt', 'utf8');
                comment += 'Post-merge canonicalization will apply:\n\n```\n' + preview + '```\n\n';
              } catch (e) {
                if (${{ steps.changed-files.outputs.count || 0 }} > 0) {
                  comment += 'Files are already in canonical form - no post-merge rewrite needed.\n\n';
                }
              }
              if (${{ steps.changed-files.outputs.deleted_count || 0 }} > 0) {
                comment += '### 🗑️ Room deletions\n\nThis submission **removes rooms** (listed below with their proc files, if any, in the diff). Deletions cannot be undone by the next release for players who edited locally - review with care:\n\n';
                '${{ steps.changed-files.outputs.deleted }}'.trim().split(/\s+/).forEach(f => { if (f) comment += `- \`${f}\`\n`; });
                comment += '\n';
              }
              if ('${{ steps.procs.outputs.proc_changes }}' === 'true') {
                comment += '⚠️ **This submission changes StringProc code** - it requires review by a StringProc maintainer before merge.\n\n';
                try {
                  let report = fs.readFileSync('proc-report.md', 'utf8');
                  const LIMIT = 40000; // stay well under GitHub's 65536-char comment cap
                  if (report.length > LIMIT) {
                    report = report.slice(0, LIMIT) + '\n```\n\n_…report truncated; see the full diff for the rest._\n';
                  }
                  comment += '### StringProc changes for review\n\n' + report + '\n';
                } catch (e) {
                  core.warning(`no proc report available: ${e.message}`);
                }
              } else {
                comment += 'Data-only change: no StringProc code is affected.\n\n';
              }
              if ('${{ steps.stale.outputs.stale }}' === 'true') {
                comment += '### ⚠️ Stale baseline - possible concurrent-edit revert\n\n';
                comment += 'These rooms changed on `main` **after** this submission\'s baseline (`${{ steps.stale.outputs.baseline }}`). Because submissions replace (or delete) the whole room file, merging as-is would revert those newer edits. A maintainer must reconcile before merge:\n\n';
                try {
                  const rooms = fs.readFileSync('stale-rooms.txt', 'utf8').trim().split('\n');
                  rooms.forEach(r => { comment += `- \`${r}\`\n`; });
                } catch (e) { core.warning(`no stale-rooms.txt: ${e.message}`); }
                comment += '\n';
              } else if ('${{ steps.stale.outputs.stale }}' === 'unknown') {
                comment += '_Note: no baseline version could be determined for this PR, so concurrent-edit safety was not verified (auto-merge disabled)._\n\n';
              }
            } else {
              comment += '❌ Submission failed to normalize - see the workflow log for the specific errors (invalid room data, dangling StringProc references, or path/id mismatches).\n\n';
            }

            comment += '---\n*Normalize check performed by [@elanthia/cartographer](https://github.com/elanthia-online/cartographer)*';

            const { data: existing } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const mine = existing.find(c => c.body && c.body.startsWith(MARKER));
            if (mine) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: mine.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  # Optional: auto-merge for data-only submissions once all checks pass.
  # Opt-in via the ENABLE_DATA_AUTO_MERGE repository variable so maintainers
  # control the policy without editing this file. Requires branch protection
  # with required status checks for --auto to be meaningful.
  auto-merge:
    needs: normalize-check
    # Data-only, effective, fresh-baseline, deletion-free - everything else
    # waits for a human.
    if: needs.normalize-check.outputs.proc_changes == 'false' && needs.normalize-check.outputs.effective == 'true' && needs.normalize-check.outputs.stale == 'false' && needs.normalize-check.outputs.deletions == '0' && vars.ENABLE_DATA_AUTO_MERGE == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for data-only submission
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}" \
            || echo "auto-merge unavailable (branch protection with required checks not configured)"
